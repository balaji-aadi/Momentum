<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0"/>
    </linearGradient>
    <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15"/>
      <feOffset dx="5" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <g filter="url(#dropshadow)">
    <!-- Abstract M shape composed of dynamic ribbons -->
    <path d="M120 400 L 120 150 L 256 320 L 392 150 L 392 400" 
          stroke="url(#mainGrad)" 
          stroke-width="60" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"/>
          
    <path d="M120 150 L 256 320 L 392 150" 
          stroke="url(#highlight)" 
          stroke-width="60" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"
          style="mix-blend-mode: overlay;"/>
  </g>
</svg>
